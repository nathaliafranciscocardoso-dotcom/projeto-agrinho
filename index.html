<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto agrinho</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="cabecalho" >

<img src="imagens/logo.png" alt="Logo Agrinho">
        <h1>AGRINHO</h1>
    </div>

    <nav>
        <a href="#projetos">Projetos</a>
        <a href="#contato">Contato</a>
        <button>Área do Aluno</button>
    </nav>
</header>

<section class="banner">

    <div class="banner-texto">
        <h2>AGRO FORTE</h2>
        <h3>FUTURO SUSTENTÁVEL</h3>

        <span>meio ambiente</span>
    </div>

</section>

<section class="conteudo">

    <div class="menu-lateral">

        <button>Apps</button>
        <button>Site</button>

        <button class="verde">Projeto</button>
        <button class="verde">Educação</button>
        <button class="verde">Sustentabilidade</button>

    </div>

    <div class="grafico">

        <img src="imagens/grafico.png" alt="Gráfico">

    </div>

</section>

<section id="contato" class="contato">

    <h2>Formulário de contato</h2>

    <form id="formulario">

        <input type="text" placeholder="Nome" required>

        <input type="email" placeholder="E-mail" required>

        <textarea placeholder="Mensagem"></textarea>

        <button type="submit">
            Enviar
        </button>

    </form>

</section>


<script src="script.js"></script>

</body>
</html>
